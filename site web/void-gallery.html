<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><title>Void Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Jaro:opsz@6..72&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <span>Void Gallery</span>
  <nav>
    <a href="#">Men</a>
    <a href="#">Women</a>
    <a href="#">Kids</a>
    <a href="#">Brands</a>
    <a href="#" class="deals">Deals</a>
    <a href="#">Cart</a>
  </nav>
</header>

<div class="layout">

  <aside class="sidebar">
    <div class="sort-open">
      <p>Sort by:</p>
      <div class="sort-option"><div class="dot"></div> Price Low to High</div>
      <div class="sort-option"><div class="dot"></div> Price High to Low</div>
      <div class="sort-option"><div class="dot"></div> Product name A - Z</div>
      <div class="sort-option"><div class="dot"></div> Product name Z - A</div>
    </div>
    <div class="filter-label"><span>Brands</span><span>∨</span></div>
    <div class="filter-label"><span>Sex</span><span>∨</span></div>
    <div class="filter-label"><span>Color</span><span>∨</span></div>
    <div class="filter-label"><span>Size</span><span>∨</span></div>
    <div class="filter-label"><span>Customer reviews</span><span>∨</span></div>
  </aside>

  <!-- Les cartes sont générées dynamiquement par script.js -->
  <div class="grid" id="cards-container"></div>

</div>

<script src="script.js"></script>
</body>
</html>
